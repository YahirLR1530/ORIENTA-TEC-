<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosco Inteligente TESCI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; user-select: none; margin: 0; background-color: #f5f7fa; }
        .hidden { display: none !important; }
        .bg-reposo { background-color: #000; color: white; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .bg-activo { min-height: 100vh; color: #1d1d1f; }
        .header-inst { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); padding: 20px; text-align: center; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .apple-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: 15px; padding: 20px; text-align: center; transition: transform 0.2s; }
        .img-placeholder { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
        .apple-btn { background-color: #0071e3; color: white; border: none; border-radius: 20px; padding: 10px 25px; font-weight: 600; margin-top: 15px; cursor: pointer; }
        .apple-btn:hover { background-color: #0077ed; }
    </style>
</head>
<body>

    <div id="vista-reposo" class="bg-reposo" onclick="activarSistema()">
        <h1 id="reloj" style="font-size: 7rem;">00:00</h1>
        <p>Toca la pantalla para comenzar</p>
    </div>

    <div id="vista-activa" class="bg-activo hidden">
        <div class="header-inst"><h2>Tecnológico de Estudios Superiores de Cuautitlán Izcalli</h2></div>
        <div class="container mt-4">
            <div id="menu-principal" class="row justify-content-center"></div>
        </div>
        
        <div id="vista-detalle" class="container mt-5 hidden">
            <div class="row justify-content-center">
                <div class="col-md-8 apple-card p-5">
                    <button class="btn btn-outline-dark mb-4" onclick="volverAlMenu()">← Regresar al Menú</button>
                    <h2 id="detalle-titulo" class="mb-4"></h2>
                    <div id="detalle-contenido" class="text-start fs-5"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Datos centralizados
        const categoriesBase = [
            { id: 'Oferta', titulo: 'Oferta Educativa', desc: 'Ingenierías y licenciaturas.', detalle: '<strong>Programas:</strong><br>• Ingeniería Mecatrónica<br>• Ingeniería en Sistemas<br>• Ingeniería Industrial<br>• Ingeniería en Logística<br>• Contador Público<br>• Arquitectura', img: 'https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=600' },
            { id: 'Tramites', titulo: 'Control Escolar', desc: 'Procesos y reinscripciones.', detalle: '<strong>Trámites:</strong><br>• Reinscripciones: Fechas según promedio.<br>• Constancias: Ventanillas Administrativas.<br>• Titulación: Inglés y Servicio Social.', img: 'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=600' },
            { id: 'Becas', titulo: 'Becas y Apoyos', desc: 'Becas institucionales.', detalle: '<strong>Apoyos:</strong><br>• Excelencia (Promedio 9.0+).<br>• Jóvenes Escribiendo el Futuro (SUBES).<br>• Exención de pago (Estudio socioeconómico).', img: 'https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=600' },
            { id: 'Servicio', titulo: 'Servicio y Residencias', desc: 'Liberación de créditos.', detalle: '<strong>Requisitos:</strong><br>• Servicio Social: 70% créditos.<br>• Residencias: 80% créditos, proyecto industrial aplicado.', img: 'https://images.unsplash.com/photo-1531482615713-2afd69097998?w=600' },
            { id: 'Extraescolares', titulo: 'Actividades Extraescolares', desc: 'Deportes y cultura.', detalle: '<strong>Formación Integral:</strong><br>• Deportes: Fútbol, básquetbol, voleibol.<br>• Cultura: Ajedrez, danza y banda de guerra.', img: 'https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?w=600' }
        ];

        function activarSistema() {
            document.getElementById('vista-reposo').classList.add('hidden');
            document.getElementById('vista-activa').classList.remove('hidden');
            renderizarMenu();
        }

        function renderizarMenu() {
            const menu = document.getElementById('menu-principal');
            menu.innerHTML = '';
            categoriesBase.forEach(c => {
                const col = document.createElement('div');
                col.className = 'col-md-4';
                col.innerHTML = `
                    <div class="apple-card">
                        <img src="${c.img}" class="img-placeholder">
                        <h3>${c.titulo}</h3>
                        <p>${c.desc}</p>
                        <button class="apple-btn" onclick="verDetalle('${c.titulo}', \`${c.detalle}\`)">Ver Más</button>
                    </div>
                `;
                menu.appendChild(col);
            });
        }

        function verDetalle(titulo, contenido) {
            document.getElementById('menu-principal').classList.add('hidden');
            document.getElementById('vista-detalle').classList.remove('hidden');
            document.getElementById('detalle-titulo').innerText = titulo;
            document.getElementById('detalle-contenido').innerHTML = contenido;
        }

        function volverAlMenu() {
            document.getElementById('vista-detalle').classList.add('hidden');
            document.getElementById('menu-principal').classList.remove('hidden');
        }

        // Reloj
        setInterval(() => {
            const now = new Date();
            document.getElementById('reloj').innerText = 
                now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
