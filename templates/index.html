<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL INSTITUCIONAL - Touch Kiosk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: 'Arial', sans-serif; 
            overflow-x: hidden;
            user-select: none; /* Evita que el usuario seleccione texto al tocar la pantalla */
        }
        .bg-reposo { 
            background-color: #000000; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; /* Indica que toda la pantalla es clickeable */
        }
        .header-inst { background-color: #ffffff; color: #790000; padding: 20px; text-align: center; font-weight: bold; }
        .card-menu { 
            background-color: white; 
            color: black; 
            border-radius: 20px; 
            padding: 30px; 
            text-align: center; 
            margin: 15px; 
            height: 250px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            transition: transform 0.2s;
        }
        /* Efecto visual sutil al presionar en pantallas touch */
        .card-menu:active { transform: scale(0.98); }
        .btn-custom { background-color: #790000; color: white; border: none; font-weight: bold; padding: 10px 20px; border-radius: 10px; }
        .btn-custom:hover { background-color: #550000; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="vista-reposo" class="bg-reposo" onclick="activarSistema()">
        <h1 id="reloj" style="font-size: 6rem; font-weight: bold;">00:00</h1>
        <p class="fs-4 mt-2 text-secondary animate-pulse">Toca la pantalla para iniciar</p>
    </div>

    <div id="vista-activa" class="hidden">
        <div class="header-inst shadow">
            <h2>TESCI - Portal Informativo Interactiva</h2>
        </div>

        <div id="menu-principal" class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card-menu shadow">
                        <h3>Trámites</h3>
                        <p class="text-muted">Inscripciones, títulos y gestión escolar.</p>
                        <button class="btn btn-custom w-100" onclick="verDetalle(event, 'Trámites', '• Inscripciones: Agosto<br>• Títulos: Módulo B')">Ver Más</button>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="card-menu shadow">
                        <h3>Becas</h3>
                        <p class="text-muted">Apoyos económicos y excelencia académica.</p>
                        <button class="btn btn-custom w-100" onclick="verDetalle(event, 'Becas', '• Excelencia Académica<br>• Apoyo Social')">Ver Más</button>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="card-menu shadow">
                        <h3>Mapa</h3>
                        <p class="text-muted">Ubicación de edificios y laboratorios.</p>
                        <button class="btn btn-custom w-100" onclick="verDetalle(event, 'Mapa', '• Edificio A: Rectoría<br>• Edificio B: Ingeniería')">Ver Más</button>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="card-menu shadow">
                        <h3>Deportes</h3>
                        <p class="text-muted">Talleres, torneos y actividades físicas.</p>
                        <button class="btn btn-custom w-100" onclick="verDetalle(event, 'Deportes', '• Fútbol: 4pm<br>• Básquetbol: Auditorio')">Ver Más</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="vista-detalle" class="container mt-5 hidden">
            <div class="row justify-content-center">
                <div class="col-md-8 bg-white text-dark p-5 rounded-4 shadow">
                    <button class="btn btn-outline-secondary mb-4" onclick="volverAlMenu(event)">← Volver</button>
                    <h2 id="detalle-titulo" class="fw-bold mb-4 text-center"></h2>
                    <div id="detalle-contenido" class="fs-5 p-3 border rounded bg-light"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let timeoutInactividad;
        let tiempoInicioSesion = null;
        const tiempoLimiteInactividad = 8000; // 8 segundos en milisegundos

        // Actualizar Reloj
        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').innerText = 
                String(ahora.getHours()).padStart(2, '0') + ':' + String(ahora.getMinutes()).padStart(2, '0');
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // Activa el kiosco al tocar la pantalla de reposo
        function activarSistema() {
            tiempoInicioSesion = new Date();
            document.getElementById('vista-reposo').classList.add('hidden');
            document.getElementById('vista-activa').classList.remove('hidden');
            
            // Iniciar el contador de inactividad
            reiniciarTemporizadorInactividad();
        }

        // Regresa automáticamente a la pantalla negra si nadie interactúa
        function volverAReposo() {
            if (tiempoInicioSesion) {
                const ahora = new Date();
                const duracion = ((ahora - tiempoInicioSesion) / 1000).toFixed(2);
                
                const inicioStr = tiempoInicioSesion.toTimeString().split(' ')[0];
                const finStr = ahora.toTimeString().split(' ')[0];

                // Guardar métricas de la sesión mediante la API
                fetch(`/api/sesion/guardar/${inicioStr}/${finStr}/${duracion}`);
                tiempoInicioSesion = null;
            }

            // Resetear vistas al estado original de reposo
            document.getElementById('vista-detalle').classList.add('hidden');
            document.getElementById('menu-principal').classList.remove('hidden');
            document.getElementById('vista-activa').classList.add('hidden');
            document.getElementById('vista-reposo').classList.remove('hidden');
        }

        // Resetea el tiempo de espera cada vez que detecta actividad (clic o touch)
        function reiniciarTemporizadorInactividad() {
            clearTimeout(timeoutInactividad);
            // Solo cuenta la inactividad si la pantalla activa es visible
            if (!document.getElementById('vista-activa').classList.contains('hidden')) {
                timeoutInactividad = setTimeout(volverAReposo, tiempoLimiteInactividad);
            }
        }

        // Escuchar clics o eventos touch globales en la pantalla activa para resetear el timeout
        document.getElementById('vista-activa').addEventListener('click', reiniciarTemporizadorInactividad);
        document.getElementById('vista-activa').addEventListener('touchstart', reiniciarTemporizadorInactividad);

        // Navegación del Kiosco
        function verDetalle(event, titulo, contenido) {
            event.stopPropagation(); // Evita que el click se duplique en los listeners globales
            fetch(`/api/click/${titulo}`);

            document.getElementById('menu-principal').classList.add('hidden');
            document.getElementById('vista-detalle').classList.remove('hidden');
            document.getElementById('detalle-titulo').innerText = titulo;
            document.getElementById('detalle-contenido').innerHTML = contenido;
            reiniciarTemporizadorInactividad();
        }

        function volverAlMenu(event) {
            event.stopPropagation();
            document.getElementById('vista-detalle').classList.add('hidden');
            document.getElementById('menu-principal').classList.remove('hidden');
            reiniciarTemporizadorInactividad();
        }
    </script>
</body>
</html>
