<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosco Inteligente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Tipografía y Reseteos estilo iOS */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            user-select: none; 
            overflow-x: hidden;
            margin: 0;
        }
        .hidden { display: none !important; }

        /* PANTALLA DE REPOSO (Dark Mode Minimalista) */
        .bg-reposo { 
            background-color: #000000; 
            color: white; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
        }
        .animate-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* PANTALLA ACTIVA (Fondo dinámico claro) */
        .bg-activo {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #1d1d1f;
        }

        .header-inst { 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #1d1d1f; 
            padding: 20px; 
            text-align: center; 
            font-weight: bold; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* TARJETAS ESTILO APPLE (Glassmorphism) */
        .apple-card { 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4); 
            border-radius: 24px; 
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); 
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin: 15px;
            padding-bottom: 20px;
            text-align: center;
        }
        .apple-card:active { transform: scale(0.96); } /* Efecto al tocar */

        /* CONTENEDOR PARA TUS IMÁGENES */
        .img-placeholder {
            width: 100%;
            height: 160px;
            background-color: #d2d2d7;
            object-fit: cover;
            display: block;
        }

        .apple-title { font-weight: 600; font-size: 1.5rem; margin-top: 15px; letter-spacing: -0.5px; }
        .apple-desc { color: #86868b; font-size: 0.95rem; padding: 0 15px; }
        
        .apple-btn { 
            background-color: #0071e3; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            padding: 8px 24px; 
            font-weight: 600; 
            margin-top: 10px; 
            transition: background-color 0.2s; 
        }
        .apple-btn:active { background-color: #005bb5; }
    </style>
</head>
<body>

    <div id="vista-reposo" class="bg-reposo" onclick="activarSistema()">
        <h1 id="reloj" style="font-size: 7rem; font-weight: 300; letter-spacing: -3px;">00:00</h1>
        <p class="fs-5 mt-2 text-secondary animate-pulse">Toca para interactuar</p>
    </div>

    <div id="vista-activa" class="bg-activo hidden">
        <div class="header-inst shadow-sm">
            <h2 class="mb-0" style="font-weight: 600; letter-spacing: -0.5px;">Portal Institucional</h2>
        </div>

        <div class="container mt-4">
            <p id="indicador-ia" class="text-center text-muted fs-6 mb-4" style="font-weight: 500;">
                ✨ Ordenado de manera inteligente según la búsqueda de los estudiantes
            </p>

            <div id="menu-principal" class="row justify-content-center"></div>
        </div>

        <div id="vista-detalle" class="container mt-5 hidden">
            <div class="row justify-content-center">
                <div class="col-md-8 apple-card p-5">
                    <button class="btn btn-outline-dark mb-4 rounded-pill px-4 fw-bold" onclick="volverAlMenu(event)">← Atrás</button>
                    <h2 id="detalle-titulo" class="apple-title mb-4 fs-1"></h2>
                    <div id="detalle-contenido" class="fs-5 p-3 text-start" style="color: #1d1d1f;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let timeoutInactividad;
        let tiempoInicioSesion = null;
        const tiempoLimiteInactividad = 8000; 

        // ==========================================
        // 🛠️ BASE DE DATOS DE LA INTERFAZ
        // Aquí puedes cambiar las rutas de las imágenes
        // ==========================================
        const categoriasBase = [
            { 
                id: 'Trámites', titulo: 'Trámites', 
                desc: 'Inscripciones, títulos y gestión escolar.', 
                detalle: '• Inscripciones: Agosto<br>• Títulos: Módulo B',
                img_src: 'ruta_imagen_tramites.jpg' // REEMPLAZA ESTO
            },
            { 
                id: 'Becas', titulo: 'Becas', 
                desc: 'Apoyos económicos y excelencia académica.', 
                detalle: '• Excelencia Académica<br>• Apoyo Social',
                img_src: 'ruta_imagen_becas.jpg' // REEMPLAZA ESTO
            },
            { 
                id: 'Mapa', titulo: 'Mapa', 
                desc: 'Ubicación de edificios y laboratorios.', 
                detalle: '• Edificio A: Rectoría<br>• Edificio B: Ingeniería',
                img_src: 'ruta_imagen_mapa.jpg' // REEMPLAZA ESTO
            },
            { 
                id: 'Deportes', titulo: 'Deportes', 
                desc: 'Talleres, torneos y actividades físicas.', 
                detalle: '• Fútbol: 4pm<br>• Básquetbol: Auditorio',
                img_src: 'ruta_imagen_deportes.jpg' // REEMPLAZA ESTO
            }
        ];

        // Reloj de la pantalla de reposo
        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj').innerText = 
                String(ahora.getHours()).padStart(2, '0') + ':' + String(ahora.getMinutes()).padStart(2, '0');
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // Activa el kiosco y carga el menú con IA
        function activarSistema() {
            tiempoInicioSesion = new Date();
            document.getElementById('vista-reposo').classList.add('hidden');
            document.getElementById('vista-activa').classList.remove('hidden');
            
            cargarMenuInteligente();
            reiniciarTemporizadorInactividad();
        }

        // ==========================================
        // 🧠 ALGORITMO DE APRENDIZAJE E INYECCIÓN HTML
        // ==========================================
        async function cargarMenuInteligente() {
            const contenedorMenu = document.getElementById('menu-principal');
            contenedorMenu.innerHTML = ''; // Limpiar menú anterior

            try {
                // Consulta al backend por las tendencias de clics
                const response = await fetch('/api/tendencias');
                const data = await response.json();
                
                if (data.status === 'success') {
                    const tendencias = data.tendencias;
                    // Ordena el menú: Si tiene muchos clics, va primero
                    categoriasBase.sort((a, b) => {
                        const clicsA = tendencias[a.id] || 0;
                        const clicsB = tendencias[b.id] || 0;
                        return clicsB - clicsA; 
                    });
                }
            } catch (e) { console.log("Error al cargar la IA, usando orden por defecto."); }

            // Dibuja las tarjetas ya ordenadas
            categoriasBase.forEach(categoria => {
                const htmlTarjeta = `
                    <div class="col-md-5">
                        <div class="apple-card" onclick="verDetalle(event, '${categoria.id}', '${categoria.detalle}')">
                            <img src="${categoria.img_src}" alt="${categoria.titulo}" class="img-placeholder">
                            <h3 class="apple-title">${categoria.titulo}</h3>
                            <p class="apple-desc">${categoria.desc}</p>
                            <button class="apple-btn">Ver Más</button>
                        </div>
                    </div>
                `;
                contenedorMenu.insertAdjacentHTML('beforeend', htmlTarjeta);
            });
        }

        function volverAReposo() {
            if (tiempoInicioSesion) {
                const ahora = new Date();
                const duracion = ((ahora - tiempoInicioSesion) / 1000).toFixed(2);
                const inicioStr = tiempoInicioSesion.toTimeString().split(' ')[0];
                const finStr = ahora.toTimeString().split(' ')[0];
                fetch(`/api/sesion/guardar/${inicioStr}/${finStr}/${duracion}`);
                tiempoInicioSesion = null;
            }
            document.getElementById('vista-detalle').classList.add('hidden');
            document.getElementById('menu-principal').classList.remove('hidden');
            document.getElementById('indicador-ia').classList.remove('hidden');
            document.getElementById('vista-activa').classList.add('hidden');
            document.getElementById('vista-reposo').classList.remove('hidden');
        }

        function reiniciarTemporizadorInactividad() {
            clearTimeout(timeoutInactividad);
            if (!document.getElementById('vista-activa').classList.contains('hidden')) {
                timeoutInactividad = setTimeout(volverAReposo, tiempoLimiteInactividad);
            }
        }

        document.getElementById('vista-activa').addEventListener('click', reiniciarTemporizadorInactividad);
        document.getElementById('vista-activa').addEventListener('touchstart', reiniciarTemporizadorInactividad);

        function verDetalle(event, titulo, contenido) {
            event.stopPropagation(); 
            fetch(`/api/click/${titulo}`); // Este clic entrena al algoritmo para la próxima vez

            document.getElementById('menu-principal').classList.add('hidden');
            document.getElementById('indicador-ia').classList.add('hidden');
            document.getElementById('vista-detalle').classList.remove('hidden');
            
            document.getElementById('detalle-titulo').innerText = titulo;
            document.getElementById('detalle-contenido').innerHTML = contenido;
            reiniciarTemporizadorInactividad();
        }

        function volverAlMenu(event) {
            event.stopPropagation();
            document.getElementById('vista-detalle').classList.add('hidden');
            document.getElementById('menu-principal').classList.remove('hidden');
            document.getElementById('indicador-ia').classList.remove('hidden');
            
            // Recargar el menú para reflejar instantáneamente el último clic
            cargarMenuInteligente();
            reiniciarTemporizadorInactividad();
        }
    </script>
</body>
</html>
